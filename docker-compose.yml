services:
  # Nginx load balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - validus-net

  # ──────────────────────────────────────────────
  # API Gateway (Replicated x2)
  # ──────────────────────────────────────────────
  api-gateway:
    build: 
      context: ./api-gateway
    deploy:
      replicas: 2
    env_file:
      - .env
    volumes:
      - shared_uploads:/shared/uploads
    depends_on:
      - ml-service
    networks:
      - validus-net

  # ──────────────────────────────────────────────
  # ML Service (Internal only)
  # ──────────────────────────────────────────────
  ml-service:
    build: 
      context: ./ml-service
    volumes:
      - shared_uploads:/shared/uploads
    # Notice: NO ports mapped to host. 
    # Only accessible within the Docker network
    networks:
      - validus-net
  
  # ──────────────────────────────────────────────
  # Frontend UI (Gradio)
  # ──────────────────────────────────────────────
  frontend:
    build: 
      context: ./frontend
    ports:
      - "8050:8050"
    env_file:
      - .env
    depends_on:
      - api-gateway
    networks:
      - validus-net


  # validus:
  #   build: .
  #   volumes:
  #     - ./images:/src/images
  #   environment:
  #     - REF_IMAGE=/src/images/original_signatures/original_8_2.png
  #     - QUERY_IMAGE=/src/images/forged_signatures/forgeries_8_2.png
  #   # cmd overrides the default command in Dockerfile if needed
  #   command: ["python", "main.py"]

volumes:
  shared_uploads:

networks:
  validus-net:
    driver: bridge