events {
    worker_connections 1024;
}

http {
    # Define the upstream block for load balancing
    # The name "api-gateway" must match the service name in docker-compose
    upstream api_gateways {
        # By default, NGINX uses round-robin load balancing.
        # Docker's internal DNS will resolve "api-gateway" to the IPs of all replicas.
        server api-gateway:8000;
    }

    # Redirect all HTTP traffic to HTTPS automatically
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS Server Block
    server {
        # Listen on standard HTTPS port
        listen 443 ssl;
        server_name _;
        
        # Paths to Cloudflare Origin Certificates
        ssl_certificate /etc/nginx/cert.pem;
        ssl_certificate_key /etc/nginx/key.pem;

        # Cloudflare recommended SSL protocols
        ssl_protocols TLSv1.2 TLSv1.3;

        # We need a large body size to allow high-res image uploads
        client_max_body_size 15M;

        # Proxy all /api/ requests to the gateways
        location /api/ {
            proxy_pass http://api_gateways;
            
            # Forward real client IPs and headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Swagger UI paths
        location /docs {
            proxy_pass http://api_gateways/docs;
            proxy_set_header Host $host;
        }
        
        location /openapi.json {
            proxy_pass http://api_gateways/openapi.json;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://api_gateways/health;
            proxy_set_header Host $host;
        }

        # Proxy root traffic to the Gradio Frontend UI
        location / {
            proxy_pass http://frontend:8050;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Gradio requires WebSocket support for interactivity
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
