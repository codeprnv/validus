events {
    worker_connections 1024;
}

http {
    # Define the upstream block for load balancing
    # The name "api-gateway" must match the service name in docker-compose
    upstream api_gateways {
        # By default, NGINX uses round-robin load balancing.
        # Docker's internal DNS will resolve "api-gateway" to the IPs of all replicas.
        server api-gateway:8000;
    }

    server {
        # Listen on standard HTTP port
        listen 80;
        
        # We need a large body size to allow high-res image uploads
        client_max_body_size 15M;

        # Proxy all /api/ requests to the gateways
        location /api/ {
            proxy_pass http://api_gateways;
            
            # Forward real client IPs and headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Swagger UI paths so we can use the web interface
        # as you requested earlier
        location /docs {
            proxy_pass http://api_gateways/docs;
            proxy_set_header Host $host;
        }
        
        location /openapi.json {
            proxy_pass http://api_gateways/openapi.json;
            proxy_set_header Host $host;
        }

        location /health {
            proxy_pass http://api_gateways/health;
            proxy_set_header Host $host;
        }
    }
}
